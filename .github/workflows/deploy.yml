name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Deploy to Google Apps Script
        env:
          CLASPRC: ${{ secrets.CLASPRC }}
        run: |
          echo "$CLASPRC" > ~/.clasprc.json
          npm run publish
